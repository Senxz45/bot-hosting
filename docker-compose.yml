version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: bot-hosting-backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production

  frontend:
    build:
      context: ./frontend
    container_name: bot-hosting-frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
